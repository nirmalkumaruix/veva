spring:
  application.name: veetu-vadagai-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/veetu_vadagai}
    username: ${DB_USERNAME:veetu}
    password: ${DB_PASSWORD:veetu}
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties.hibernate.jdbc.time_zone: UTC
  flyway.enabled: true
  servlet.multipart.max-file-size: 10MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: ${JWT_ACCESS_MINUTES:20}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
app:
  cors-origins: ${CORS_ORIGINS:http://localhost:5173}
  razorpay.key-id: ${RAZORPAY_KEY_ID:rzp_test_demo}
  razorpay.key-secret: ${RAZORPAY_KEY_SECRET:demo_secret}
server.port: ${PORT:8080}
management.endpoints.web.exposure.include: health,info,metrics
management.health.mail.enabled: ${MAIL_HEALTH_ENABLED:false}
springdoc.swagger-ui.path: /swagger-ui.html
