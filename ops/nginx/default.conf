upstream api { server backend:8080; }
upstream web { server frontend:80; }
server {
  listen 80;
  server_name _;
  client_max_body_size 20m;
  location /api/ { proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location /v3/api-docs { proxy_pass http://api; }
  location /swagger-ui { proxy_pass http://api; }
  location /ws { proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
  location / { proxy_pass http://web; }
}
