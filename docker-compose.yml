services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veetu_vadagai
      POSTGRES_USER: veetu
      POSTGRES_PASSWORD: veetu
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U veetu -d veetu_vadagai"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/veetu_vadagai
      DB_USERNAME: veetu
      DB_PASSWORD: veetu
      JWT_SECRET: replace-with-at-least-64-random-characters-for-local-compose
      CORS_ORIGINS: http://localhost:5173,http://localhost:8088
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    ports: ["5173:80"]
    depends_on: [backend]
  nginx:
    image: nginx:1.27-alpine
    ports: ["8088:80"]
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, backend]
volumes:
  postgres_data:
